<!DOCTYPE html>

<html class="dark" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login - Protraining</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-secondary": "#002d6e",
                        "secondary-fixed-dim": "#b0c6ff",
                        "primary-fixed-dim": "#cfbcff",
                        "outline": "#958da2",
                        "inverse-on-surface": "#2f3131",
                        "surface-bright": "#37393a",
                        "secondary-fixed": "#d9e2ff",
                        "on-secondary-fixed-variant": "#00429b",
                        "surface-container": "#1e2020",
                        "inverse-surface": "#e2e2e2",
                        "primary": "#cfbcff",
                        "surface-container-high": "#282a2b",
                        "on-error-container": "#ffdad6",
                        "on-tertiary": "#363100",
                        "on-error": "#690005",
                        "on-tertiary-fixed": "#1f1c00",
                        "surface-variant": "#333535",
                        "secondary": "#b0c6ff",
                        "surface-container-low": "#1a1c1c",
                        "background": "#121414",
                        "on-primary-container": "#cfbcff",
                        "error-container": "#93000a",
                        "tertiary-container": "#bdad00",
                        "on-secondary-fixed": "#001945",
                        "on-primary-fixed-variant": "#5400cc",
                        "surface-dim": "#121414",
                        "surface": "#121414",
                        "on-background": "#e2e2e2",
                        "on-primary": "#3a0092",
                        "on-tertiary-fixed-variant": "#4f4800",
                        "on-surface-variant": "#cbc3d9",
                        "error": "#ffb4ab",
                        "primary-fixed": "#e9ddff",
                        "surface-tint": "#cfbcff",
                        "surface-container-highest": "#333535",
                        "outline-variant": "#494456",
                        "on-secondary-container": "#f2f3ff",
                        "secondary-container": "#0068ed",
                        "inverse-primary": "#6e25f6",
                        "on-primary-fixed": "#22005d",
                        "tertiary": "#dbc900",
                        "surface-container-lowest": "#0c0f0f",
                        "on-tertiary-container": "#474000",
                        "tertiary-fixed-dim": "#dbc900",
                        "tertiary-fixed": "#fae500",
                        "on-surface": "#e2e2e2",
                        "primary-container": "#6200ea"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "20px",
                        "container-max-width": "1280px",
                        "base-unit": "8px",
                        "margin-desktop": "64px",
                        "gutter": "24px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-md-mobile": ["Inter"],
                        "display-lg": ["Inter"],
                        "title-sm": ["Inter"],
                        "display-lg-mobile": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-md": ["Inter"],
                        "headline-md": ["Inter"]
                    },
                    "fontSize": {
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }],
                        "headline-md-mobile": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "display-lg": ["48px", { "lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "title-sm": ["20px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "display-lg-mobile": ["36px", { "lineHeight": "44px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "headline-md": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #113399 0%, #1E50C5 35%, #4A3BB1 65%, #7A22B3 100%);
            min-height: 100vh;
            color: #ffffff;
            margin: 0;
            padding: 0;
        }

        .glass-panel {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>

<body
    class="text-on-background min-h-screen font-body-lg flex items-center justify-center p-margin-mobile md:p-margin-desktop antialiased">
    <!-- Main Container -->
    <main class="w-full max-w-md mx-auto flex flex-col items-center justify-center space-y-1">
        <!-- Brand Logo Area -->
        <div class="flex flex-col items-center space-y-4">
            <div class="w-32 h-32 md:w-40 md:h-40 flex items-center justify-center">
                <img alt="Brand Logo" class="w-full h-full object-contain drop-shadow-xl shadow-primary-container/30"
                    src="./LOGO.png" />
            </div>
        </div>
        <!-- Login Form Panel -->
        <div class="glass-panel w-full rounded-xl p-8 shadow-[0_20px_40px_rgba(207,188,255,0.1)]">
            <form class="space-y-6" id="login-form">
                <!-- Input Group -->
                <div class="space-y-2">
                    <label class="block font-label-md text-label-md text-on-surface-variant" for="access-code">
                        Ingrese Código de Acceso
                    </label>
                    <div class="relative">
                        <span
                            class="absolute inset-y-0 left-0 flex items-center pl-4 text-on-surface-variant opacity-70">
                            <span class="material-symbols-outlined"
                                style="font-variation-settings: 'FILL' 0;">password</span>
                        </span>
                        <input autocomplete="off"
                            class="w-full bg-white/5 border border-white/15 rounded-lg py-4 pl-12 pr-4 text-on-surface focus:outline-none focus:border-secondary-container focus:ring-1 focus:ring-secondary-container transition-all duration-300 placeholder-on-surface-variant/50"
                            id="access-code" name="access-code" placeholder="e.j. A3F#" type="text" />
                    </div>
                </div>
                <!-- Submit Button -->
                <button
                    class="w-full bg-secondary-container text-white rounded-lg py-4 font-title-sm text-title-sm hover:bg-secondary-container/90 hover:-translate-y-0.5 transition-all duration-300 shadow-lg shadow-secondary-container/20 flex items-center justify-center gap-2 relative overflow-hidden group"
                    type="submit">
                    <span class="absolute top-0 left-0 w-full h-[1px] bg-white/20"></span>
                    <span>Ingresar</span>
                    <span class="material-symbols-outlined"
                        style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
                </button>
            </form>
        </div>
    </main>
<script src="./login.js"></script>
</body>

</html>
